<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .info-bar {
            display: flex;
            gap: 40px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
        }

        .score, .high-score {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .score-value, .high-score-value {
            color: #4CAF50;
            font-size: 22px;
        }

        .canvas-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        canvas {
            display: block;
            background: #222;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }

        .overlay-title {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .overlay-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 20px;
        }

        .overlay-score {
            color: #4CAF50;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .restart-btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.5);
        }

        .restart-btn:active {
            transform: translateY(0);
        }

        .controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .control-btn {
            width: 60px;
            height: 60px;
            font-size: 24px;
            color: #fff;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:active {
            background: rgba(76, 175, 80, 0.5);
            transform: scale(0.95);
            border-color: #4CAF50;
        }

        .control-btn:nth-child(2) { grid-column: 2; grid-row: 1; }
        .control-btn:nth-child(1) { grid-column: 1; grid-row: 2; }
        .control-btn:nth-child(3) { grid-column: 3; grid-row: 2; }
        .control-btn:nth-child(4) { grid-column: 2; grid-row: 2; }

        @media (max-width: 450px) {
            .controls {
                display: grid;
            }

            .info-bar {
                gap: 20px;
                font-size: 16px;
            }

            .score-value, .high-score-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="info-bar">
            <div class="score">
                <span>分数:</span>
                <span class="score-value">0</span>
            </div>
            <div class="high-score">
                <span>最高分:</span>
                <span class="high-score-value">0</span>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div id="overlay" class="overlay">
                <div class="overlay-title">贪吃蛇</div>
                <div class="overlay-subtitle">按方向键或滑动开始</div>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn" id="upBtn">↑</button>
            <button class="control-btn" id="downBtn">↓</button>
            <button class="control-btn" id="leftBtn">←</button>
            <button class="control-btn" id="rightBtn">→</button>
        </div>
    </div>

    <script>
        // 游戏常量
        const GRID_SIZE = 20;
        const CELL_SIZE = 20;
        const CANVAS_SIZE = 400;

        // 游戏状态
        let canvas, ctx;
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = 0;
        let gameLoop = null;
        let speed = 150;
        let gameStarted = false;
        let gameOver = false;
        let foodAnimating = false;

        // 元素引用
        let overlay, scoreElement, highScoreElement;

        // 初始化游戏
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            overlay = document.getElementById('overlay');
            scoreElement = document.querySelector('.score-value');
            highScoreElement = document.querySelector('.high-score-value');

            // 加载最高分
            highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
            highScoreElement.textContent = highScore;

            // 初始化蛇位置（居中，向右）
            resetSnake();

            // 生成食物
            spawnFood();

            // 绘制初始状态
            draw();

            // 绑定事件
            bindEvents();
        }

        // 重置蛇
        function resetSnake() {
            const center = CANVAS_SIZE / CELL_SIZE / 2;
            snake = [
                { x: center - 1, y: center },
                { x: center - 2, y: center },
                { x: center - 3, y: center }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
        }

        // 生成食物
        function spawnFood() {
            let validPosition = false;
            while (!validPosition) {
                food.x = Math.floor(Math.random() * GRID_SIZE);
                food.y = Math.floor(Math.random() * GRID_SIZE);
                validPosition = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
            foodAnimating = true;
            setTimeout(() => foodAnimating = false, 200);
        }

        // 绑定事件
        function bindEvents() {
            // 键盘控制
            document.addEventListener('keydown', handleKeyDown);

            // 触摸滑动控制
            let touchStartX = 0, touchStartY = 0;
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                const deltaX = touchEndX - touchStartX;
                const deltaY = touchEndY - touchStartY;

                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    if (deltaX > 20 && direction.x !== -1) setDirection(1, 0);
                    else if (deltaX < -20 && direction.x !== 1) setDirection(-1, 0);
                } else {
                    if (deltaY > 20 && direction.y !== -1) setDirection(0, 1);
                    else if (deltaY < -20 && direction.y !== 1) setDirection(0, -1);
                }
            }, { passive: false });

            // 虚拟按键控制
            document.getElementById('upBtn').addEventListener('click', () => setDirection(0, -1));
            document.getElementById('downBtn').addEventListener('click', () => setDirection(0, 1));
            document.getElementById('leftBtn').addEventListener('click', () => setDirection(-1, 0));
            document.getElementById('rightBtn').addEventListener('click', () => setDirection(1, 0));

            // 重启按钮
            const restartBtn = document.querySelector('.restart-btn');
            if (restartBtn) {
                restartBtn.addEventListener('click', restartGame);
            }
        }

        // 处理键盘输入
        function handleKeyDown(e) {
            if (gameOver && e.key === ' ') {
                restartGame();
                return;
            }

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    setDirection(0, -1);
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    setDirection(0, 1);
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    setDirection(-1, 0);
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    setDirection(1, 0);
                    break;
            }
        }

        // 设置方向（禁止180度反向）
        function setDirection(x, y) {
            if (direction.x === -x && direction.y === -y) return;
            nextDirection = { x, y };
            
            if (!gameStarted && !gameOver) {
                startGame();
            }
        }

        // 开始游戏
        function startGame() {
            gameStarted = true;
            gameOver = false;
            score = 0;
            speed = 150;
            scoreElement.textContent = score;
            overlay.style.display = 'none';
            
            // 清除现有循环
            if (gameLoop) clearInterval(gameLoop);
            
            // 启动游戏循环
            gameLoop = setInterval(update, speed);
        }

        // 游戏结束
        function endGame() {
            gameOver = true;
            gameStarted = false;
            
            // 更新最高分
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore.toString());
                highScoreElement.textContent = highScore;
            }

            // 清除循环
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = null;
            }

            // 闪烁效果
            flashScreen();

            // 显示结束界面
            setTimeout(() => {
                overlay.innerHTML = `
                    <div class="overlay-title">游戏结束</div>
                    <div class="overlay-score">最终得分: ${score}</div>
                    <button class="restart-btn" onclick="restartGame()">点击重新开始</button>
                `;
                overlay.style.display = 'flex';
            }, 300);

            // 震动反馈（支持的设备）
            if ('vibrate' in navigator) {
                navigator.vibrate([100, 50, 100]);
            }
        }

        // 屏幕闪烁效果
        function flashScreen() {
            let flashes = 0;
            const flashInterval = setInterval(() => {
                canvas.style.backgroundColor = flashes % 2 === 0 ? '#444' : '#222';
                flashes++;
                if (flashes >= 4) {
                    clearInterval(flashInterval);
                    canvas.style.backgroundColor = '#222';
                }
            }, 100);
        }

        // 重新开始游戏
        function restartGame() {
            resetSnake();
            spawnFood();
            score = 0;
            speed = 150;
            scoreElement.textContent = score;
            gameOver = false;
            startGame();
        }

        // 更新游戏状态
        function update() {
            direction = { ...nextDirection };

            // 计算新蛇头位置
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // 检测碰撞
            if (checkCollision(head)) {
                endGame();
                return;
            }

            // 添加新蛇头
            snake.unshift(head);

            // 检测是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                // 增加分数
                score += 10;
                scoreElement.textContent = score;

                // 加速（最低60ms）
                speed = Math.max(60, speed - 5);
                
                // 重新设置游戏循环速度
                clearInterval(gameLoop);
                gameLoop = setInterval(update, speed);

                // 生成新食物
                spawnFood();
            } else {
                // 移除蛇尾
                snake.pop();
            }

            // 绘制
            draw();
        }

        // 检测碰撞
        function checkCollision(head) {
            // 撞墙检测
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                return true;
            }

            // 撞自己检测
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }

            return false;
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // 绘制网格
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, CANVAS_SIZE);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(CANVAS_SIZE, i * CELL_SIZE);
                ctx.stroke();
            }

            // 绘制食物
            drawFood();

            // 绘制蛇
            drawSnake();
        }

        // 绘制蛇
        function drawSnake() {
            snake.forEach((segment, index) => {
                const x = segment.x * CELL_SIZE;
                const y = segment.y * CELL_SIZE;
                
                if (index === 0) {
                    // 蛇头
                    ctx.fillStyle = '#4CAF50';
                } else {
                    // 蛇身（渐变效果）
                    const alpha = 1 - (index / snake.length) * 0.4;
                    ctx.fillStyle = `rgba(139, 195, 74, ${alpha})`;
                }

                // 圆角方块
                const radius = 6;
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, radius);
                ctx.fill();

                // 蛇头眼睛
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeSize = 4;
                    const eyeOffset = 5;
                    
                    if (direction.x === 1) { // 向右
                        ctx.beginPath(); ctx.arc(x + CELL_SIZE - eyeOffset, y + eyeOffset, eyeSize, 0, Math.PI * 2); ctx.fill();
                        ctx.beginPath(); ctx.arc(x + CELL_SIZE - eyeOffset, y + CELL_SIZE - eyeOffset, eyeSize, 0, Math.PI * 2); ctx.fill();
                    } else if (direction.x === -1) { // 向左
                        ctx.beginPath(); ctx.arc(x + eyeOffset, y + eyeOffset, eyeSize, 0, Math.PI * 2); ctx.fill();
                        ctx.beginPath(); ctx.arc(x + eyeOffset, y + CELL_SIZE - eyeOffset, eyeSize, 0, Math.PI * 2); ctx.fill();
                    } else if (direction.y === 1) { // 向下
                        ctx.beginPath(); ctx.arc(x + eyeOffset, y + CELL_SIZE - eyeOffset, eyeSize, 0, Math.PI * 2); ctx.fill();
                        ctx.beginPath(); ctx.arc(x + CELL_SIZE - eyeOffset, y + CELL_SIZE - eyeOffset, eyeSize, 0, Math.PI * 2); ctx.fill();
                    } else { // 向上
                        ctx.beginPath(); ctx.arc(x + eyeOffset, y + eyeOffset, eyeSize, 0, Math.PI * 2); ctx.fill();
                        ctx.beginPath(); ctx.arc(x + CELL_SIZE - eyeOffset, y + eyeOffset, eyeSize, 0, Math.PI * 2); ctx.fill();
                    }
                }
            });
        }

        // 绘制食物
        function drawFood() {
            const x = food.x * CELL_SIZE + CELL_SIZE / 2;
            const y = food.y * CELL_SIZE + CELL_SIZE / 2;
            const radius = CELL_SIZE / 2 - 3;

            // 缩放动画
            const scale = foodAnimating ? 1.3 : 1;

            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            
            // 食物阴影
            ctx.fillStyle = 'rgba(244, 67, 54, 0.3)';
            ctx.beginPath();
            ctx.arc(2, 2, radius, 0, Math.PI * 2);
            ctx.fill();

            // 食物主体
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
            gradient.addColorStop(0, '#FF6B6B');
            gradient.addColorStop(1, '#F44336');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
