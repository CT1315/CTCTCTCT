<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #faf8ef;
            padding-top: 20px;
        }
        .container {
            width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .score-container {
            background: #bbada0;
            padding: 5px 15px;
            border-radius: 3px;
            color: white;
            font-weight: bold;
        }
        #grid {
            width: 400px;
            height: 400px;
            background: #bbada0;
            border-radius: 6px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            padding: 10px;
        }
        .tile {
            background: #cdc1b4;
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
            color: #776e65;
            transition: all 0.1s ease;
        }
        .tile-2 { background: #eee4da; }
        .tile-4 { background: #ede0c8; }
        .tile-8 { background: #f2b179; color: white; }
        .tile-16 { background: #f59563; color: white; }
        .tile-32 { background: #f67c5f; color: white; }
        .tile-64 { background: #f65e3b; color: white; }
        .tile-128 { background: #edcf72; color: white; font-size: 26px; }
        .tile-256 { background: #edcc61; color: white; font-size: 26px; }
        .tile-512 { background: #edc850; color: white; font-size: 26px; }
        .tile-1024 { background: #edc53f; color: white; font-size: 22px; }
        .tile-2048 { background: #edc22e; color: white; font-size: 22px; }
        #game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(238, 228, 218, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        #game-over h2 {
            font-size: 40px;
            color: #776e65;
        }
        #restart-btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 3px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048</h1>
        <div class="score-container">分数: <span id="score">0</span></div>
    </div>
    <div id="grid"></div>
    <div id="game-over">
        <h2>游戏结束!</h2>
        <button id="restart-btn">再来一局</button>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('game-over');
        const restartBtn = document.getElementById('restart-btn');

        let grid = [];
        let score = 0;

        // 初始化游戏
        function init() {
            grid = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            scoreElement.textContent = score;
            gameOverElement.style.display = 'none';
            addRandomTile();
            addRandomTile();
            renderGrid();
        }

        // 添加随机方块
        function addRandomTile() {
            const emptyTiles = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) emptyTiles.push([i, j]);
                }
            }
            if (emptyTiles.length > 0) {
                const [x, y] = emptyTiles[Math.floor(Math.random() * emptyTiles.length)];
                grid[x][y] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        // 渲染网格
        function renderGrid() {
            gridElement.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const tile = document.createElement('div');
                    tile.className = `tile tile-${grid[i][j] || 0}`;
                    tile.textContent = grid[i][j] || '';
                    gridElement.appendChild(tile);
                }
            }
        }

        // 合并行
        function slideAndMerge(row) {
            let newRow = row.filter(num => num !== 0);
            for (let i = 0; i < newRow.length - 1; i++) {
                if (newRow[i] === newRow[i + 1]) {
                    newRow[i] *= 2;
                    score += newRow[i];
                    newRow[i + 1] = 0;
                }
            }
            newRow = newRow.filter(num => num !== 0);
            while (newRow.length < 4) newRow.push(0);
            return newRow;
        }

        // 移动方向
        function move(direction) {
            let moved = false;
            const oldGrid = JSON.parse(JSON.stringify(grid));

            if (direction === 'left') {
                for (let i = 0; i < 4; i++) {
                    grid[i] = slideAndMerge(grid[i]);
                }
            } else if (direction === 'right') {
                for (let i = 0; i < 4; i++) {
                    grid[i] = slideAndMerge(grid[i].reverse()).reverse();
                }
            } else if (direction === 'up') {
                for (let j = 0; j < 4; j++) {
                    let column = [];
                    for (let i = 0; i < 4; i++) column.push(grid[i][j]);
                    column = slideAndMerge(column);
                    for (let i = 0; i < 4; i++) grid[i][j] = column[i];
                }
            } else if (direction === 'down') {
                for (let j = 0; j < 4; j++) {
                    let column = [];
                    for (let i = 0; i < 4; i++) column.push(grid[i][j]);
                    column = slideAndMerge(column.reverse()).reverse();
                    for (let i = 0; i < 4; i++) grid[i][j] = column[i];
                }
            }

            // 检查是否移动
            moved = JSON.stringify(oldGrid) !== JSON.stringify(grid);
            if (moved) {
                addRandomTile();
                scoreElement.textContent = score;
                renderGrid();
                if (checkGameOver()) {
                    gameOverElement.style.display = 'flex';
                }
            }
        }

        // 检查游戏结束
        function checkGameOver() {
            // 有空位则没结束
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) return false;
                }
            }
            // 无相邻相同数字则结束
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (j < 3 && grid[i][j] === grid[i][j + 1]) return false;
                    if (i < 3 && grid[i][j] === grid[i + 1][j]) return false;
                }
            }
            return true;
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowLeft': move('left'); break;
                case 'ArrowRight': move('right'); break;
                case 'ArrowUp': move('up'); break;
                case 'ArrowDown': move('down'); break;
            }
        });

        // 重新开始
        restartBtn.addEventListener('click', init);

        // 初始化游戏
        init();
    </script>
</body>
</html>
